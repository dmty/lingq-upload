# cargo-deny configuration.
#
# Schema:  https://embarkstudios.github.io/cargo-deny/checks/cfg.html
# Local:   cargo install --locked cargo-deny && \
#          cargo deny --manifest-path src-tauri/Cargo.toml check
#
# Policy summary:
#   * licenses     — permissive SPDX allowlist; copyleft (GPL/AGPL/LGPL) is
#                    implicitly disallowed by absence from `allow`.
#   * advisories   — hard-deny known vulns; warn-only on unmaintained/yanked
#                    so transitive churn does not block CI.
#   * bans         — `multiple-versions = "warn"` is informational only; the
#                    default cargo-deny-action invocation will NOT fail CI on
#                    duplicates. Promote to "deny" once the dep graph
#                    stabilises.
#   * sources      — only crates.io; no git registries.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# advisories: deny known vulns; warn on unmaintained/yanked so we are alerted
# without blocking CI on transitive churn.
# ---------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Only error on unmaintained advisories that hit a workspace crate directly;
# transitive unmaintained churn (Tauri's GTK3 stack, the unic-* family pulled
# in by urlpattern, etc.) is unactionable here. Vulnerability advisories
# still hard-deny regardless of where they sit in the dep tree.
unmaintained = "workspace"
ignore = []

# ---------------------------------------------------------------------------
# licenses: SPDX allowlist. Anything outside this list fails the build.
# Each entry must be tied to a real transitive dep; audit with
# `cargo deny check licenses` before adding to keep the surface minimal.
# ---------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    # webpki-roots ships under CDLA-Permissive-2.0; drop when reqwest
    # switches to system roots.
    "CDLA-Permissive-2.0",
]
exceptions = []

# ---------------------------------------------------------------------------
# bans: catch duplicate-version crates or known-bad crates.
# `multiple-versions = "warn"` is INFORMATIONAL — cargo-deny-action does not
# fail CI on warnings. Promote to "deny" once the dep graph is stable.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# sources: only crates.io and rustsec-style git deps from trusted orgs.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
