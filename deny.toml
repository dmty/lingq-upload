# cargo-deny configuration.
# Schema: https://embarkstudios.github.io/cargo-deny/checks/cfg.html
#
# Run locally: cargo install --locked cargo-deny && cargo deny --manifest-path src-tauri/Cargo.toml check

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# advisories: deny known vulns; warn on unmaintained/yanked so we are alerted
# without blocking CI on transitive churn.
# ---------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ---------------------------------------------------------------------------
# licenses: SPDX allowlist. Anything outside this list fails the build.
# Copyleft (GPL/AGPL/LGPL) is implicitly disallowed by absence from `allow`.
# ---------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# bans: catch duplicate-version crates or known-bad crates. Soft today (warn);
# tighten once we have a stable dep graph.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# sources: only crates.io and rustsec-style git deps from trusted orgs.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
