# Mints a per-run token from the `lingq-upload-release-please` GitHub App.
# Reason: events fired by the default GITHUB_TOKEN do not trigger other
# workflows, so without this App the release publish won't fan out to
# .github/workflows/release.yml. Required repo secrets:
#   RELEASE_PLEASE_APP_ID, RELEASE_PLEASE_APP_PRIVATE_KEY
# The App must be installed on this repo with Contents: read+write and
# Pull requests: read+write.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
